<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King Angus Burger</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:0;
}

header{
background:#c1121f;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.item{
background:#1d1d1d;
padding:15px;
margin-bottom:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#c1121f;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

#cart{
position:fixed;
bottom:0;
width:100%;
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
}

#tracking{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#000;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:24px;
}

</style>
</head>

<body>

<header>
🍔 King Angus Burger
</header>

<div class="container">

<div class="item">
<span>Smash Burger</span>
<button onclick="addCart('Smash Burger',25)">Adicionar</button>
</div>

<div class="item">
<span>Cheddar Bacon</span>
<button onclick="addCart('Cheddar Bacon',30)">Adicionar</button>
</div>

<div class="item">
<span>Duplo Angus</span>
<button onclick="addCart('Duplo Angus',35)">Adicionar</button>
</div>

</div>

<div id="cart">
<span id="total">Total R$0</span>
<button onclick="finalizarPedido()">Enviar Pedido</button>
</div>

<div id="tracking">
<p id="statusPedido">Aguardando...</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"SUA_API",
authDomain:"SEU_PROJETO.firebaseapp.com",
databaseURL:"https://SEU_PROJETO-default-rtdb.firebaseio.com",
projectId:"SEU_PROJETO",
storageBucket:"SEU_PROJETO.appspot.com",
messagingSenderId:"XXXX",
appId:"XXXX"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let cart=[];

window.addCart=function(nome,preco){

cart.push({
nome:nome,
preco:preco
});

updateCart();

}

function updateCart(){

let total=0;

cart.forEach(i=>total+=i.preco);

document.getElementById("total").innerText="Total R$"+total;

}

window.finalizarPedido=function(){

const nome=prompt("Seu nome");

let total=0;

cart.forEach(i=>total+=i.preco);

const pedido={

cliente:nome,
itens:cart,
total:total,
status:"novo",
hora:new Date().toLocaleTimeString()

};

const pedidosRef=ref(db,"pedidos");

const novoPedido=push(pedidosRef,pedido);

localStorage.setItem("pedidoId",novoPedido.key);

acompanharPedido(novoPedido.key);

document.getElementById("tracking").style.display="flex";

}

function acompanharPedido(id){

const pedidoRef=ref(db,"pedidos/"+id);

onValue(pedidoRef,(snapshot)=>{

const pedido=snapshot.val();

document.getElementById("statusPedido").innerText=
"Status: "+pedido.status;

});

}

window.onload=function(){

const id=localStorage.getItem("pedidoId");

if(id){

document.getElementById("tracking").style.display="flex";

acompanharPedido(id);

}

}

</script>

</body>
</html>
